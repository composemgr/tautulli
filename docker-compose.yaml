# nginx proxy address - http://172.17.0.1:8181

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  tautulli:
    image: linuxserver/tautulli:latest
    container_name: tautulli-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - tautulli
    ports:
      - "8181:8181"
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${SERVICE_USER:-1000}
      PGID: ${SERVICE_GROUP:-1000}
    volumes:
      - ./volumes/config/tautulli:/config
      - ./volumes/data/tautulli:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  tautulli:
    external: false
